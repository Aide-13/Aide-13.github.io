<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Aide </title>
    <link rel="icon" href="assets/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <img src="assets/img/logo.png" alt="Logo">
            <h1>Aide Garcia Martinez</h1>
        </div>
        <nav class="navegacion">
            <ul>
                <li><a href="#sobremi">Sobre mí</a></li>
                <li><a href="#proyectos">Proyectos</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <div class="contenedor">
        <main>
            <section class="hero">
                <div class="hero-left">
                    <p class="presentacion">FRONTEND DEVELOPER</p>
                    <h3 class="titulo">
                        <span class="primero">
                            Hola, soy
                        </span>
                        <br>
                        <span class="segundo">
                            Aide.
                        </span>
                    </h3>
                    <p class="descripcionPrincipal">
                        Me gusta construir cosas que sean utiles y que se vean bien. Esa combinación es lo que me trajo al frontend.
                    </p>
                    <div class="botones">
                        <button class="primario">Ver projectos -></button>
                        <button class="secundario">Contacto -></button>
                    </div>
                </div>
                <div class="hero-right">
                    <div class="deco">
                        <div class="star"><img src="assets/img/sparkle.png" alt="Sparkles"></div>
                        <div class="star-2"><img src="assets/img/sparkle.png" alt="Sparkle"></div>
                        <div class="star-3"><img src="assets/img/sparkle.png" alt="Sparkle"></div>
                    </div>
                    <div class="hero-avatar-wrap">
                        <div class="hero-avatar-bg"></div>
                        <div class="hero-badge">📍 Estado de México, México</div>
                        <div class="hero-badge-2">Open to work 🟢​</div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
<script src="assets/js/script.js"></script>
</html>
